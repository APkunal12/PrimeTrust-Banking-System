apiVersion: apps/v1
kind: Deployment

metadata:
  name: banking-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: banking-app

  template:

    metadata:
      labels:
        app: banking-app

    spec:
      containers:
      - name: banking-container
        image: nginx
        ports:
        - containerPort: 80